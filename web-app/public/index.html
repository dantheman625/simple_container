<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Number Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      min-width: 400px;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
      font-size: 28px;
    }

    p {
      color: #666;
      margin-bottom: 40px;
      font-size: 16px;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 16px;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 2px solid #eee;
    }

    .result-label {
      color: #666;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .result-number {
      font-size: 48px;
      font-weight: bold;
      color: #667eea;
      margin: 20px 0;
    }

    .loading {
      color: #999;
      font-style: italic;
      font-size: 14px;
    }

    .error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 10px;
    }

    .success {
      color: #27ae60;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎲 Random Number Generator</h1>
    <p>Click the button below to get a random number from the API</p>

    <button id="getNumberBtn">Get Random Number</button>

    <div class="result" id="result" style="display: none;">
      <div class="result-label">Random Number</div>
      <div class="result-number" id="numberDisplay">-</div>
      <div id="status"></div>
    </div>
  </div>

  <script>
    const getNumberBtn = document.getElementById('getNumberBtn');
    const result = document.getElementById('result');
    const numberDisplay = document.getElementById('numberDisplay');
    const status = document.getElementById('status');

    getNumberBtn.addEventListener('click', async () => {
      getNumberBtn.disabled = true;
      status.className = 'loading';
      status.textContent = 'Loading...';
      result.style.display = 'block';

      try {
        // use service name when running in Docker Compose network
        const response = await fetch('http://api-app:3001/random', {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
          },
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        numberDisplay.textContent = data.number;
        status.className = 'success';
        status.textContent = '✓ Success!';
      } catch (error) {
        numberDisplay.textContent = '?';
        status.className = 'error';
        status.textContent = `✗ Error: ${error.message}`;
        console.error('Error:', error);
      } finally {
        getNumberBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
